name: Deploy Landing Page
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, debjesse]
    steps:
      - name: Create/Update Portainer Stack
        env:
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          TUNNEL_TOKEN: ${{ secrets.TUNNEL_TOKEN }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          GITHUB_REPO_TOKEN: ${{ secrets.GITHUB_REPO_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          ENDPOINT_ID="${PORTAINER_ENDPOINT_ID:-3}"

          # Check if stack already exists
          STACK_ID=$(curl -sk "$PORTAINER_URL/api/stacks" \
            -H "X-API-Key: $PORTAINER_API_KEY" \
            | jq -r ".[] | select(.Name==\"$REPO_NAME\") | .Id")

          if [ -n "$STACK_ID" ] && [ "$STACK_ID" != "null" ]; then
            # Update existing stack (pull latest)
            curl -sk -X PUT "$PORTAINER_URL/api/stacks/$STACK_ID/git/redeploy?endpointId=$ENDPOINT_ID" \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              --data "{
                \"pullImage\": true,
                \"repositoryAuthentication\": true,
                \"repositoryUsername\": \"debjesse\",
                \"repositoryPassword\": \"$GITHUB_REPO_TOKEN\"
              }"
            echo "Stack $REPO_NAME updated (ID: $STACK_ID)"
          else
            # Create new stack from this repo
            curl -sk -X POST "$PORTAINER_URL/api/stacks/create/standalone/repository?endpointId=$ENDPOINT_ID" \
              -H "X-API-Key: $PORTAINER_API_KEY" \
              -H "Content-Type: application/json" \
              --data "{
                \"name\": \"$REPO_NAME\",
                \"repositoryURL\": \"$REPO_URL\",
                \"repositoryAuthentication\": true,
                \"repositoryUsername\": \"debjesse\",
                \"repositoryPassword\": \"$GITHUB_REPO_TOKEN\",
                \"repositoryReferenceName\": \"refs/heads/main\",
                \"composeFile\": \"docker-compose.yml\",
                \"env\": [{\"name\": \"TUNNEL_TOKEN\", \"value\": \"$TUNNEL_TOKEN\"}]
              }"
            echo "Stack $REPO_NAME created"
          fi
